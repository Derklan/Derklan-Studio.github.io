<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="{{ site.baseurl }}/assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/styles.css" />
  <title>{{ page.title }} — {{ site.title }}</title>
</head>
<body data-page="{{ page.active }}">

  {% include header.html %}

  {{ content }}

  {% include footer.html %}

  <script src="{{ site.baseurl }}/assets/js/app.js"></script>
  {% if page.admin %}
  <script src="{{ site.baseurl }}/assets/js/admin.js"></script>
  {% endif %}
</body>
</html>
